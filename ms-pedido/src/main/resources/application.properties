spring.application.name=ms-pedido
server.port=8083

# Conexion a MySQL (Laragon) - base de datos propia de este microservicio
spring.datasource.url=jdbc:mysql://localhost:3306/ms_pedido_db
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URLs de los microservicios de los que depende ms-pedido
ms.cliente.url=http://localhost:8082/api/clientes
ms.producto.url=http://localhost:8080/api/productos
