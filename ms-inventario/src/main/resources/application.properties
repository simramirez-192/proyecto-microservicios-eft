spring.application.name=ms-inventario
server.port=8081

# Conexion a MySQL (Laragon) - base de datos propia de este microservicio
spring.datasource.url=jdbc:mysql://localhost:3306/ms_inventario_db
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL donde vive ms-producto, para poder consultarlo por RestTemplate
ms.producto.url=http://localhost:8080/api/productos
