spring.application.name=ms-pago
server.port=8084

# Conexion a MySQL (Laragon) - base de datos propia de este microservicio
spring.datasource.url=jdbc:mysql://localhost:3306/ms_pago_db
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL del microservicio del que depende ms-pago
ms.pedido.url=http://localhost:8083/api/pedidos
